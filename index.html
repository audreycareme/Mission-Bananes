<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<!-- Mission Bananes v8 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nos tâches">
<meta name="theme-color" content="#fff9f0">
<title>Mission Bananes</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fff9f0;
  --card:#ffffff;
  --tx:#1a1a2e;
  --tx2:#6b6b8a;
  --tx3:#a0a0b8;
  --bd:rgba(26,26,46,.07);

  /* Couleurs enfants — vives et distinctes */
  --sa:#3ab86e;   /* vert — Sacha */
  --sa-l:#e6f9ee; --sa-m:#80d4a4; --sa-d:#1a6e40;
  --el:#a066cc;   /* parme — Elsa */
  --el-l:#f5eeff; --el-m:#cca8e8; --el-d:#5c2890;
  --sr:#e8448a;   /* rose — Sarah */
  --sr-l:#fde8f3; --sr-m:#f0a0c8; --sr-d:#8c1850;
  --pa:#3b82f6;   /* bleu — Parents */
  --pa-l:#eff6ff; --pa-m:#93c5fd; --pa-d:#1d4ed8;

  --ok:#2eb872; --ok-l:#e8fff2;
  --warn:#f59e0b; --warn-l:#fffbeb;
  --err:#ef4444; --err-l:#fff0f0;

  --r:18px; --rsm:12px; --rxs:8px;
  --shadow:0 4px 16px rgba(26,26,46,.1);
  --shadow-sm:0 2px 8px rgba(26,26,46,.08);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);color:var(--tx);
  -webkit-font-smoothing:antialiased;
  font-size:15px;
}

/* ══ WHO SCREEN ══ */
#sw{
  min-height:100dvh;display:flex;flex-direction:column;justify-content:center;
  padding:max(env(safe-area-inset-top),1.5rem) 1.25rem 2rem;
  gap:1.25rem;
}
.who-title{text-align:center}

.who-title h1{
  font-size:1.9rem;font-weight:900;color:var(--tx);
  line-height:1.15;
}
.who-title p{font-size:13px;font-weight:700;color:var(--tx2);margin-top:.3rem;letter-spacing:.02em}

.wsect{font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.who-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.who-btn{
  border-radius:var(--r);border:none;cursor:pointer;
  text-align:center;font-family:'Nunito',sans-serif;
  padding:1.25rem .75rem 1rem;
  transition:transform .12s;
  box-shadow:var(--shadow);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.who-btn::after{
  content:'';position:absolute;
  top:-30%;left:-30%;width:60%;height:60%;
  background:rgba(255,255,255,.2);
  border-radius:50%;
  pointer-events:none;
}
.who-btn:active{transform:scale(.93)}
.who-btn.sa{background:linear-gradient(135deg,var(--sa),#60d890)}
.who-btn.el{background:linear-gradient(135deg,var(--el),#c890f0)}
.who-btn.sr{background:linear-gradient(135deg,var(--sr),#f080b8)}
.who-btn.pa{background:linear-gradient(135deg,var(--pa),#60a5fa);grid-column:1/-1}
.who-av{
  font-size:2rem;display:flex;align-items:center;justify-content:center;
  width:100%;height:120px;flex:0 0 120px;margin-bottom:12px;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.15));
}
.who-av img{max-width:85%;max-height:100%;object-fit:contain;display:block}
.who-name{font-size:19px;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.2);text-align:center;line-height:1.15;width:100%;margin-top:auto;display:flex;align-items:flex-end;justify-content:center;min-height:2.4em}
.who-sub{font-size:19px;font-weight:900;color:#fff;margin-top:2px;text-align:center;line-height:1.15;width:100%;text-shadow:0 1px 3px rgba(0,0,0,.2)}
.divider{height:1px;background:rgba(26,26,46,.06)}

/* ══ APP ══ */
#sm{min-height:100dvh;display:none;flex-direction:column}

/* Topbar coloré selon l'enfant */
.topbar{
  padding:max(env(safe-area-inset-top,0px),.4rem) 1.25rem .7rem;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:20;
  transition:background .3s;
}
.topbar.sa-bar{background:linear-gradient(135deg,var(--sa),#60d890)}
.topbar.el-bar{background:linear-gradient(135deg,var(--el),#c890f0)}
.topbar.sr-bar{background:linear-gradient(135deg,var(--sr),#f080b8)}
.topbar.pa-bar{background:linear-gradient(135deg,var(--pa),#60a5fa)}
.tb-l{display:flex;align-items:center;gap:10px}
.tb-av{
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.15);
}
.tb-name{font-size:17px;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.15)}
.tb-date{font-size:11px;font-weight:700;color:rgba(255,255,255,.8)}
.tb-r{display:flex;align-items:center;gap:7px}
.sdot-wrap{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.2);border-radius:20px;padding:4px 8px}
.sdot{width:7px;height:7px;border-radius:50%;background:#fff;flex-shrink:0}
.sdot.spin{animation:pulse .7s infinite}
.sdot.offline{opacity:.4}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.stxt{font-size:11px;font-weight:800;color:rgba(255,255,255,.9)}
.chg{
  font-size:12px;font-weight:800;color:rgba(255,255,255,.9);
  background:rgba(255,255,255,.2);border:none;
  border-radius:20px;padding:5px 12px;cursor:pointer;
  font-family:'Nunito',sans-serif;
}

/* ══ TABS ══ */
.tabs{
  display:flex;gap:6px;padding:.65rem 1.25rem .4rem;
  overflow-x:auto;scrollbar-width:none;
  background:var(--bg);
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:7px 16px;
  border-radius:20px;border:2.5px solid rgba(26,26,46,.1);
  background:#fff;cursor:pointer;
  font-size:13px;font-weight:800;color:var(--tx2);
  font-family:'Nunito',sans-serif;white-space:nowrap;
  transition:all .15s;box-shadow:var(--shadow-sm);
}
.tab.on.sa-tab{background:var(--sa);color:#fff;border-color:var(--sa)}
.tab.on.el-tab{background:var(--el);color:#fff;border-color:var(--el)}
.tab.on.sr-tab{background:var(--sr);color:#fff;border-color:var(--sr)}
.tab.on.pa-tab{background:var(--pa);color:#fff;border-color:var(--pa)}

.pane{display:none;padding:.5rem 1.25rem 5.5rem;overflow-y:auto}
.pane.on{display:block}

/* ══ BOTTOM NAV ══ */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;
  border-top:2px solid rgba(26,26,46,.06);
  display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:30;
  box-shadow:0 -4px 16px rgba(26,26,46,.06);
}
.nb{
  flex:1;padding:9px 4px 7px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;color:var(--tx3);
  transition:color .15s;font-weight:800;position:relative;
}
.nb svg{width:22px;height:22px}
.nb span{font-size:10px}
.nb-badge{
  position:absolute;top:5px;right:calc(50% - 20px);
  background:var(--err);color:#fff;
  font-size:9px;font-weight:900;min-width:16px;height:16px;
  border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;
}

/* ══ SECTION LABEL ══ */
.slbl{
  font-size:11px;font-weight:900;letter-spacing:.08em;
  text-transform:uppercase;color:var(--tx3);
  margin:1.1rem 0 .5rem;
  display:flex;align-items:center;gap:8px;
}
.slbl::after{content:'';flex:1;height:2px;background:rgba(26,26,46,.05);border-radius:2px}

/* ══ MONTH PROGRESS CARD ══ */
.mp-card{
  border-radius:var(--r);padding:14px 16px;
  margin-bottom:.9rem;
  box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}
.mp-card::before{
  content:'';position:absolute;
  right:-20px;top:-20px;
  width:100px;height:100px;
  background:rgba(255,255,255,.15);
  border-radius:50%;
}
.mp-card.sa-card{background:linear-gradient(135deg,var(--sa),#60d890)}
.mp-card.el-card{background:linear-gradient(135deg,var(--el),#c890f0)}
.mp-card.sr-card{background:linear-gradient(135deg,var(--sr),#f080b8)}
.mp-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative}
.mp-label{font-size:12px;font-weight:800;color:rgba(255,255,255,.8)}
.mp-emoji{font-size:2rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2))}
.mp-val{font-size:2rem;font-weight:900;color:#fff;line-height:1;margin-top:4px}
.mp-max{font-size:12px;font-weight:700;color:rgba(255,255,255,.7)}
.mp-prov{font-size:11px;font-weight:800;color:rgba(255,255,255,.8);margin-top:2px}
.prog-wrap{position:relative;height:10px;background:rgba(255,255,255,.2);border-radius:5px;overflow:hidden;margin:10px 0 4px}
.prog-ok{position:absolute;left:0;top:0;height:100%;background:#fff;border-radius:5px;transition:width .4s}
.prog-prov{position:absolute;top:0;height:100%;background:rgba(255,255,255,.5);border-radius:5px;transition:width .4s,left .4s}
.prog-lbls{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:rgba(255,255,255,.7)}

/* ══ MINI CALENDAR ══ */
.mini-cal{
  background:#fff;border-radius:var(--r);
  padding:14px;margin-bottom:.9rem;
  box-shadow:var(--shadow-sm);border:2px solid rgba(26,26,46,.06);
}
.mini-cal-title{
  font-size:14px;font-weight:900;color:var(--tx);
  text-align:center;margin-bottom:10px;
}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.mhd{font-size:10px;font-weight:900;color:var(--tx3);text-align:center;padding:2px 0}
.md{
  width:100%;aspect-ratio:1;border-radius:9px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;border:2px solid transparent;background:var(--bg);
  font-family:'Nunito',sans-serif;transition:all .12s;
}
.md:active{transform:scale(.88)}
.md.other{opacity:.2;cursor:default}
.md.sel{border-color:var(--tx)!important}
.mn{font-size:11px;font-weight:900;color:var(--tx);line-height:1}
.md.today .mn{color:#fff}
.mdot{width:5px;height:5px;border-radius:50%;margin-top:2px}
/* États par classe d'enfant */
.sa-cal .md.today{background:var(--sa);border-color:var(--sa)}
.el-cal .md.today{background:var(--el);border-color:var(--el)}
.sr-cal .md.today{background:var(--sr);border-color:var(--sr)}
.md.all-ok{background:var(--ok-l);border-color:var(--ok)}
.md.all-ok .mdot{background:var(--ok)}
.md.part{background:var(--warn-l);border-color:var(--warn)}
.md.part .mdot{background:var(--warn)}
.md.has{background:#fff;border-color:rgba(26,26,46,.12)}
.md.has .mdot{background:var(--tx3)}

/* ══ DAY HEADER ══ */
.day-hd{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:.8rem;
  background:#fff;border-radius:var(--rsm);
  padding:10px 14px;box-shadow:var(--shadow-sm);
  border:2px solid rgba(26,26,46,.06);
}
.day-lbl{font-size:15px;font-weight:900;color:var(--tx)}
.day-sub{font-size:11px;font-weight:700;color:var(--tx2);margin-top:1px}
.day-navs{display:flex;gap:5px}
.dnav{
  background:var(--bg);border:2px solid rgba(26,26,46,.1);
  border-radius:var(--rxs);padding:5px 10px;cursor:pointer;
  font-size:14px;color:var(--tx2);
  font-family:'Nunito',sans-serif;font-weight:900;
  transition:transform .1s;
}
.dnav:active{transform:scale(.9)}

/* ══ TASK CARD ══ */
.tc{
  background:#fff;
  border:2.5px solid rgba(26,26,46,.08);
  border-radius:var(--r);
  padding:12px 13px;
  display:flex;align-items:center;gap:11px;
  margin-bottom:8px;
  -webkit-user-select:none;user-select:none;
  transition:all .12s;
  box-shadow:var(--shadow-sm);
}
.tc.click{cursor:pointer}
.tc.click:active{transform:scale(.98);background:var(--bg)}
.tc.com{
  border-left:5px solid rgba(26,26,46,.12);
  border-radius:5px var(--r) var(--r) 5px;
}
/* Couleurs left-border selon enfant */
.tc.com.sa-tc{border-left-color:var(--sa-m)}
.tc.com.el-tc{border-left-color:var(--el-m)}
.tc.com.sr-tc{border-left-color:var(--sr-m)}

.tc.st-prov{border-color:var(--warn);background:var(--warn-l)}
.tc.st-ok{border-color:var(--ok);background:var(--ok-l);opacity:.5}
.tc.st-rej{border-color:var(--err);background:var(--err-l)}

/* Icône tâche */
.ticon{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}
.ticon.sa-ic{background:var(--sa-l)}
.ticon.el-ic{background:var(--el-l)}
.ticon.sr-ic{background:var(--sr-l)}
.ticon.co-ic{background:var(--bg)}

/* Check circle */
.chk{
  width:30px;height:30px;flex-shrink:0;border-radius:50%;
  border:3px solid rgba(26,26,46,.1);
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;cursor:pointer;font-size:13px;font-weight:900;
}
.chk.empty{}
.chk.prov{background:var(--warn-l);border-color:var(--warn);color:var(--warn)}
.chk.ok{background:var(--ok-l);border-color:var(--ok)}
.chk.ok svg{display:block}
.chk.rej{background:var(--err-l);border-color:var(--err);color:var(--err)}
.chk svg{display:none;width:15px;height:15px}

.tbd{flex:1;min-width:0}
.tn{font-size:14px;font-weight:800;color:var(--tx);line-height:1.3}
.tm{font-size:11px;font-weight:700;color:var(--tx2);margin-top:3px;display:flex;flex-wrap:wrap;align-items:center;gap:4px}

/* Chips */
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:900}
.chip.sa{background:var(--sa-l);color:var(--sa-d)}
.chip.el{background:var(--el-l);color:var(--el-d)}
.chip.sr{background:var(--sr-l);color:var(--sr-d)}
.chip.co{background:var(--bg);color:var(--tx2)}
.chip.ok{background:var(--ok-l);color:var(--ok)}
.chip.warn{background:var(--warn-l);color:#b45309}
.chip.err{background:var(--err-l);color:var(--err)}

/* Boutons validation */
.val-btns{display:flex;gap:6px;margin-top:8px}
.btn-ok{
  padding:7px 16px;background:var(--ok);color:#fff;
  border:none;border-radius:20px;cursor:pointer;
  font-size:12px;font-weight:900;font-family:'Nunito',sans-serif;
  box-shadow:0 2px 6px rgba(46,184,114,.3);
}
.btn-rej{
  padding:7px 14px;background:#fff;color:var(--err);
  border:2.5px solid var(--err);border-radius:20px;cursor:pointer;
  font-size:12px;font-weight:900;font-family:'Nunito',sans-serif;
}

/* ══ ADD AREA ══ */
.add-area{margin-top:1rem}
.add-bar{display:flex;gap:8px}
.add-input{
  flex:1;height:46px;
  border:2.5px solid rgba(26,26,46,.1);
  border-radius:var(--rsm);background:#fff;
  padding:0 14px;font-size:14px;font-weight:700;
  font-family:'Nunito',sans-serif;color:var(--tx);outline:none;
  box-shadow:var(--shadow-sm);
  transition:border-color .15s;
}
.add-input:focus{border-color:var(--tx)}
.add-input::placeholder{color:var(--tx3);font-weight:600}
.add-btn{
  height:46px;padding:0 16px;
  background:var(--tx);color:#fff;
  border:none;border-radius:var(--rsm);cursor:pointer;
  font-size:14px;font-weight:900;font-family:'Nunito',sans-serif;
  box-shadow:var(--shadow-sm);white-space:nowrap;
  transition:transform .1s;
}
.add-btn:active{transform:scale(.95)}
.who-row{display:flex;gap:6px;margin-top:8px}
.wb{
  flex:1;padding:8px 4px;border-radius:var(--rsm);
  border:2.5px solid rgba(26,26,46,.08);background:#fff;
  cursor:pointer;font-size:12px;font-weight:900;
  font-family:'Nunito',sans-serif;color:var(--tx2);text-align:center;
  transition:all .1s;box-shadow:var(--shadow-sm);
}
.wb:active{transform:scale(.93)}
.wb.sa.on{background:var(--sa);color:#fff;border-color:var(--sa)}
.wb.el.on{background:var(--el);color:#fff;border-color:var(--el)}
.wb.sr.on{background:var(--sr);color:#fff;border-color:var(--sr)}
.wb.co.on{background:var(--tx);color:#fff;border-color:var(--tx)}

/* ══ BILAN CARD ══ */
.bcard{
  background:#fff;border:2.5px solid rgba(26,26,46,.07);
  border-radius:var(--r);margin-bottom:10px;
  overflow:hidden;box-shadow:var(--shadow-sm);
}
.bcard-hd{
  padding:13px 14px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;
  transition:background .1s;
}
.bcard-hd:active{background:var(--bg)}
.bcard-hd-l{display:flex;align-items:center;gap:12px}
.bcard-av{
  width:42px;height:42px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}
.bcard-av.sa-av{background:linear-gradient(135deg,var(--sa),#60d890)}
.bcard-av.el-av{background:linear-gradient(135deg,var(--el),#c890f0)}
.bcard-av.sr-av{background:linear-gradient(135deg,var(--sr),#f080b8)}
.bcard-name{font-size:16px;font-weight:900;color:var(--tx)}
.bcard-sub{font-size:12px;font-weight:700;color:var(--tx2);margin-top:2px}
.bcard-body{
  display:none;padding:0 14px 14px;
  border-top:2px solid rgba(26,26,46,.05);
}
.bcard-body.on{display:block}
.ptabs{display:flex;gap:6px;margin:10px 0 8px}
.ptab{
  padding:6px 14px;border-radius:20px;
  border:2.5px solid rgba(26,26,46,.08);background:#fff;
  cursor:pointer;font-size:12px;font-weight:900;color:var(--tx2);
  font-family:'Nunito',sans-serif;transition:all .15s;
}
.ptab.on{background:var(--tx);color:#fff;border-color:var(--tx)}
.prog-dbl{position:relative;height:10px;background:var(--bg);border-radius:5px;overflow:hidden;margin:8px 0 4px}
.prog-dbl-ok{position:absolute;left:0;top:0;height:100%;border-radius:5px;transition:width .4s}
.prog-dbl-pv{position:absolute;top:0;height:100%;border-radius:5px;opacity:.4;background:var(--warn);transition:width .4s,left .4s}
.sa-bar .prog-dbl-ok{background:var(--sa)}
.el-bar .prog-dbl-ok{background:var(--el)}
.sr-bar .prog-dbl-ok{background:var(--sr)}

/* ══ ASSIGN ══ */
.assign-row{
  background:#fff;border:2.5px solid rgba(26,26,46,.07);
  border-radius:var(--r);padding:12px 13px;margin-bottom:8px;
  box-shadow:var(--shadow-sm);
}
.assign-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;gap:8px}
.assign-lbl{font-size:14px;font-weight:800;color:var(--tx);line-height:1.3;flex:1}
.assign-pts{font-size:11px;font-weight:700;color:var(--tx3);margin-top:2px;white-space:nowrap}
.assign-btns{display:flex;gap:6px;flex-wrap:wrap}
.abtn{
  padding:6px 13px;border-radius:20px;
  border:2.5px solid rgba(26,26,46,.08);background:#fff;
  cursor:pointer;font-size:12px;font-weight:900;color:var(--tx2);
  font-family:'Nunito',sans-serif;transition:all .1s;
}
.abtn:active{transform:scale(.92)}
.abtn.sa.on{background:var(--sa);color:#fff;border-color:var(--sa)}
.abtn.el.on{background:var(--el);color:#fff;border-color:var(--el)}
.abtn.sr.on{background:var(--sr);color:#fff;border-color:var(--sr)}
.abtn.none.on{background:var(--tx);color:#fff;border-color:var(--tx)}

/* ══ WEEK NAV ══ */
.wk-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:#fff;border-radius:var(--rsm);
  margin-bottom:.75rem;box-shadow:var(--shadow-sm);
  border:2px solid rgba(26,26,46,.06);
}
.wk-lbl{font-size:13px;font-weight:900;color:var(--tx)}
.wk-btn{
  background:var(--bg);border:2.5px solid rgba(26,26,46,.1);
  border-radius:var(--rxs);padding:5px 11px;cursor:pointer;
  font-size:14px;color:var(--tx2);font-weight:900;
  font-family:'Nunito',sans-serif;transition:transform .1s;
}
.wk-btn:active{transform:scale(.88)}

/* ══ POT ══ */
.pot{
  background:linear-gradient(135deg,#1a1a2e,#2d2d4e);
  border-radius:var(--r);padding:16px;
  display:flex;align-items:center;justify-content:space-between;
  margin:.9rem 0 .5rem;box-shadow:0 6px 20px rgba(26,26,46,.2);
}
.pot-lbl{font-size:11px;font-weight:800;opacity:.5;color:#fff;margin-bottom:3px}
.pot-v{font-size:1.9rem;font-weight:900;color:#fff;line-height:1}
.pot-sub{font-size:11px;font-weight:700;opacity:.45;color:#fff;margin-top:2px}

/* ══ NOTIF ══ */
.nrow{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;background:#fff;
  border:2.5px solid rgba(26,26,46,.07);
  border-radius:var(--rsm);margin-bottom:7px;
  box-shadow:var(--shadow-sm);
}
.tgl{position:relative;width:46px;height:26px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0;position:absolute}
.tslider{position:absolute;inset:0;background:rgba(26,26,46,.12);border-radius:13px;cursor:pointer;transition:background .2s}
.tslider::before{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl input:checked+.tslider{background:var(--ok)}
.tgl input:checked+.tslider::before{transform:translateX(20px)}
.tin{
  font-size:14px;font-weight:800;background:var(--bg);
  border:2.5px solid rgba(26,26,46,.1);border-radius:var(--rxs);
  padding:5px 10px;font-family:'Nunito',sans-serif;color:var(--tx);
}
.save-btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,#1a1a2e,#2d2d4e);color:#fff;
  border:none;border-radius:var(--r);font-size:15px;font-weight:900;
  cursor:pointer;font-family:'Nunito',sans-serif;margin-top:.5rem;
  box-shadow:0 4px 12px rgba(26,26,46,.2);transition:transform .1s;
}
.save-btn:active{transform:scale(.97)}

/* ══ VALIDATION BANNER ══ */
.val-banner{
  background:linear-gradient(135deg,var(--warn-l),#fff);
  border:2.5px solid var(--warn);
  border-radius:var(--r);padding:12px 14px;
  margin-bottom:.75rem;box-shadow:var(--shadow-sm);
}
.val-banner-title{font-size:14px;font-weight:900;color:#92400e}
.val-banner-sub{font-size:12px;font-weight:700;color:#b45309;margin-top:2px}

/* ══ EMPTY ══ */
.empty{
  text-align:center;padding:2.5rem 1rem;
  color:var(--tx3);font-size:14px;font-weight:700;line-height:1.7;
}
.empty-emoji{font-size:3rem;display:block;margin-bottom:.5rem}

/* ══ MENU TOPBAR ══ */
.chg-menu{
  position:absolute;top:calc(100% + 6px);right:1.25rem;
  background:#fff;border-radius:var(--rsm);
  box-shadow:0 8px 24px rgba(26,26,46,.15);
  border:2px solid rgba(26,26,46,.07);
  z-index:100;min-width:190px;overflow:hidden;
}
.chg-menu-item{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:12px 16px;border:none;background:none;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;
  color:var(--tx);cursor:pointer;text-align:left;
  transition:background .1s;
}
.chg-menu-item:active{background:var(--bg)}
.chg-menu-item+.chg-menu-item{border-top:1.5px solid rgba(26,26,46,.06)}

/* ══ MODALE MOT DE PASSE ══ */
#pwdOverlay{
  display:none;position:fixed;inset:0;
  background:rgba(26,26,46,.55);z-index:9998;
  padding:1rem;align-items:center;justify-content:center;
}
#pwdOverlay.on{display:flex}
.pwd-box{
  width:min(420px,100%);background:#fff;
  border-radius:22px;box-shadow:0 20px 50px rgba(0,0,0,.25);
  padding:1.25rem 1rem 1rem;
}
.pwd-box h2{font-size:1.1rem;font-weight:900;color:var(--tx);text-align:center;margin-bottom:1rem}
.pwd-field{
  height:46px;width:100%;
  border:2px solid rgba(26,26,46,.1);border-radius:14px;
  padding:0 12px;font:800 14px 'Nunito',sans-serif;
  color:var(--tx);outline:none;margin-bottom:.6rem;
  background:var(--bg);
}
.pwd-field:focus{border-color:var(--tx)}
#pwdMsg{min-height:1.4em;font:800 12px 'Nunito',sans-serif;text-align:center;margin:.4rem 0}

/* ══ SOLDE STRIP ══ */
.solde-strip{
  display:flex;gap:8px;margin-bottom:.75rem;
}
.sc2{
  flex:1;background:#fff;border-radius:var(--rsm);
  padding:.75rem .5rem;text-align:center;
  border:2.5px solid rgba(26,26,46,.07);
  box-shadow:var(--shadow-sm);
}
.sc2-v{font-size:1.1rem;font-weight:900;color:var(--tx);line-height:1}
.sc2-l{font-size:10px;font-weight:800;color:var(--tx3);margin-top:4px;line-height:1.3}
</style>
</head>

function potPct(date){
  const d=new Date((date||todayStr())+'T12:00:00');
  const day=d.getDate();
  if(day<=7)return 0.10;
  if(day<=15)return 0.20;
  if(day<=22)return 0.30;
  return 0.40;
}
// Bananes allant en cagnotte pour une tâche validée à une date
function ptsToPot(pts,date){return Math.round(pts*potPct(date))}
function ptsToPoche(pts,date){return pts-ptsToPot(pts,date)}

function initWeekAssignments(wk){
  const days=wkDays(wk);
  days.forEach(date=>{
    const dow=new Date(date+'T12:00:00').getDay();
    COMMON.forEach(t=>{
      const fa=FIXED_ASSIGNMENTS[t.id]?.[dow];
      if(!fa)return;
      Object.entries(fa).forEach(([slot,kid])=>{
        const k='cs|'+t.id+'|'+date+'|'+slot;
        if(!S[k])S[k]=kid; // ne pas écraser une modif manuelle
      });
    });
  });
}

// Clé d'un créneau assigné : "cs|tid|date|slot" = kid
function csGet(tid,date,slot){return S['cs|'+tid+'|'+date+'|'+slot]||null}
function csSet(tid,date,slot,kid){
  if(kid)S['cs|'+tid+'|'+date+'|'+slot]=kid;
  else delete S['cs|'+tid+'|'+date+'|'+slot];
}
// Clé d'un créneau coché par l'enfant : "cc|tid|date|slot" = {by,st}
function ccEntry(tid,date,slot){return S['cc|'+tid+'|'+date+'|'+slot]||null}
function ccSet(tid,date,slot,kid,st){
  if(kid&&st)S['cc|'+tid+'|'+date+'|'+slot]={by:kid,st};
  else delete S['cc|'+tid+'|'+date+'|'+slot];
}
// Créneaux assignés à un enfant pour une date
function slotsForKidDay(kid,date){
  const dow=new Date(date+'T12:00:00').getDay();
  const result=[];
  COMMON.forEach(t=>{
    const daySlots=t.slots[dow]||[];
    daySlots.forEach(slot=>{
      if(csGet(t.id,date,slot)===kid) result.push({t,slot});
    });
  });
  return result;
}

function setISt(kid,tid,date,st){if(st)S['i|'+kid+'|'+tid+'|'+date]=st;else delete S['i|'+kid+'|'+tid+'|'+date];}
function cEntry(tid,date){return S['c|'+tid+'|'+date]||null}
function setCEntry(tid,date,who,st){if(who&&st)S['c|'+tid+'|'+date]={who,st};else delete S['c|'+tid+'|'+date];}
function caGet(tid,wk){return S['ca|'+tid+'|'+wk]||null}

   DATE HELPERS
════════════════════════════════ */
function todayStr(){return d2s(new Date());}
// Format date en local (évite bug fuseau horaire avec toISOString)
function d2s(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function wkKey(dt){
  const d=dt?new Date(dt+'T12:00:00'):new Date();
  const day=d.getDay(); // 0=dim,1=lun...6=sam
  const daysFromMon=day===0?6:day-1;
  const m=new Date(d.getFullYear(),d.getMonth(),d.getDate()-daysFromMon);
  return d2s(m);
}
function mKey(dt){const d=dt?new Date(dt+'T12:00:00'):new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function isWE(dt){const d=new Date(dt+'T12:00:00');return d.getDay()===0||d.getDay()===6}
function wkDays(wk){const a=[],m=new Date(wk+'T12:00:00');for(let i=0;i<7;i++){const x=new Date(m.getFullYear(),m.getMonth(),m.getDate()+i);a.push(d2s(x));}return a;}
function prevWk(wk){const d=new Date(wk+'T12:00:00');return d2s(new Date(d.getFullYear(),d.getMonth(),d.getDate()-7));}
function nextWk(wk){const d=new Date(wk+'T12:00:00');return d2s(new Date(d.getFullYear(),d.getMonth(),d.getDate()+7));}
function prevDay(d){const dt=new Date(d+'T12:00:00');return d2s(new Date(dt.getFullYear(),dt.getMonth(),dt.getDate()-1));}
function nextDay(d){const dt=new Date(d+'T12:00:00');return d2s(new Date(dt.getFullYear(),dt.getMonth(),dt.getDate()+1));}
function fmtDay(dt){
  const d=new Date(dt+'T12:00:00');
  const J=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const M=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  return J[d.getDay()]+' '+d.getDate()+' '+M[d.getMonth()];
}
function fmtWkRange(wk){
  const m=new Date(wk+'T12:00:00'),s=new Date(m);s.setDate(m.getDate()+6);
  const Mo=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  return m.getDate()+' '+Mo[m.getMonth()]+' – '+s.getDate()+' '+Mo[s.getMonth()];
}
function daysInMonth(mk){const[y,mo]=mk.split('-').map(Number);return new Date(y,mo,0).getDate()}
function firstDOW(mk){const[y,mo]=mk.split('-').map(Number);const d=new Date(y,mo-1,1).getDay();return d===0?6:d-1}

function todayCommon(date){

function earnedFor(kid,filterFn){
  // Returns {okPt, provPt, pochePt, potPt} — all in bananes
  let okPt=0,provPt=0,pochePt=0,potPt=0;
  Object.keys(S).filter(k=>k.startsWith('i|'+kid+'|')).forEach(k=>{
    const parts=k.split('|'),date=parts[3],st=S[k];
    if(filterFn&&!filterFn(date))return;
    const kid=parts[1],tid=parts[2];
    const t=(INDIV[kid]||[]).find(x=>x.id===tid) || Object.values(S['custom|'+kid]||{}).find(x=>x.id===tid);
    if(!t)return;
    if(st==='ok'){okPt+=t.pts;pochePt+=ptsToPoche(t.pts,date);potPt+=ptsToPot(t.pts,date);}
    else if(st==='prov')provPt+=t.pts;
  });
  Object.keys(S).filter(k=>k.startsWith('cc|')).forEach(k=>{
    const v=S[k];if(!v||v.by!==kid)return;
    const parts=k.split('|'),date=parts[2];
    if(filterFn&&!filterFn(date))return;
    const t=COMMON.find(x=>x.id===parts[1]);
    if(!t)return;
    if(v.st==='ok'){okPt+=t.pts;pochePt+=ptsToPoche(t.pts,date);potPt+=ptsToPot(t.pts,date);}
    else if(v.st==='prov')provPt+=t.pts;
  });
  return{okPt,provPt,pochePt,potPt,
    ok:pochePt*RATE, prov:provPt*RATE}; // ok/prov en € pour compat parents
}
function potMonth(mk){
  mk=mk||mKey();
  let total=0;
  KIDS.forEach(k=>{
    const{potPt}=earnedFor(k,d=>mKey(d)===mk);
    total+=potPt;
  });
  return total*RATE;
}
function earnedMonth(kid,mk){mk=mk||mKey();return earnedFor(kid,d=>mKey(d)===mk)}
function earnedWeek(kid,wk){wk=wk||wkKey();return earnedFor(kid,d=>wkKey(d)===wk)}
function earnedTotal(kid){return earnedFor(kid,null);}

function pendingCount(){
  const today=todayStr();
  const cutoffPast=new Date();cutoffPast.setDate(cutoffPast.getDate()-7);
  const cutoffPastStr=d2s(cutoffPast);
  let n=0;
  Object.keys(S).forEach(k=>{
    if(k.startsWith('i|')&&S[k]==='prov'){
      const date=k.split('|')[3];
      if(date<=today&&date>=cutoffPastStr)n++;
    }
    if(k.startsWith('cc|')&&S[k]&&S[k].st==='prov'){
      const date=k.split('|')[2];
      if(date<=today&&date>=cutoffPastStr)n++;
    }
  });
  return n;
}

// Tâches quinzaine : toutes les 2 semaines à partir d'une date de référence
const QUINZAINE_REF={
  'sa5' :'2026-04-05', // Aspirateur chambre Sacha — dim 5 avril
  'sa10':'2026-04-12', // Tondre jardin — dim 12 avril
  'sa_ram':'2026-04-06', // Ramener poubelles — lun 6 avril
  'el_pou':'2026-04-05', // Sortir poubelles — dim 5 avril
  'el8' :'2026-04-12', // Nettoyer 208 — dim 12 avril
  'el9' :'2026-04-05', // Nettoyer 5008 — dim 5 avril
  'el_asp':'2026-04-12', // Aspirateur communs — dim 12 avril
  'sr4' :'2026-04-12', // Aider Elsa 208 — dim 12 avril
  'sr5' :'2026-04-05', // Aider Elsa 5008 — dim 5 avril
};
function isQuinzaineDay(tid,date){
  const ref=QUINZAINE_REF[tid];
  if(!ref)return false;
  const d=new Date(date+'T12:00:00');
  const r=new Date(ref+'T12:00:00');
  const diff=Math.round((d-r)/86400000);
  return diff>=0&&diff%14===0;
}
function weekOfMonth(date){
  const d=new Date(date+'T12:00:00');
  const first=new Date(d.getFullYear(),d.getMonth(),1);
  const fdow=first.getDay();
  const firstMon=new Date(first);
  firstMon.setDate(1-(fdow===0?6:fdow-1));
  return Math.floor((d-firstMon)/604800000);
}

function tasksForDay(kid,date){
  const mk=mKey();
  const dow=new Date(date+'T12:00:00').getDay();
  const tasks=[];

  // Créneaux communs assignés à cet enfant ce jour
  slotsForKidDay(kid,date).forEach(({t,slot})=>{
    const ent=ccEntry(t.id,date,slot);
    tasks.push({...t,isCommon:true,slot,slotSt:ent?.st||null});
  });

  // Tâches individuelles — UNIQUEMENT le jour fixé
  getTasksFor(kid).filter(t=>!isTaskDisabled(kid,t.id)).forEach(t=>{
    const fixedDow= t.fixedDow!==undefined ? t.fixedDow : FIXED_DAY[t.id];

    if(t.period==='quotidien'){
      tasks.push({...t,isCommon:false});
      return;
    }
    if(t.period==='hebdo'){
      if(fixedDow===undefined)return; // pas de jour fixe = masqué
      if(dow===fixedDow||['ok','prov'].includes(iSt(kid,t.id,date)))
        tasks.push({...t,isCommon:false});
      return;
    }
    if(t.period==='mensuel'){
      if(fixedDow===undefined)return;
      const wom=weekOfMonth(date);
      const allowedW=t.fixedWeeks||null;
      const done=Object.keys(S).some(k=>
        k.startsWith('i|'+kid+'|'+t.id+'|')&&
        mKey(k.split('|')[3])===mk&&['ok','prov'].includes(S[k]));
      const rightWeek=!allowedW||allowedW.includes(wom);
      if((!done&&dow===fixedDow&&rightWeek)||['ok','prov'].includes(iSt(kid,t.id,date)))
        tasks.push({...t,isCommon:false});
      return;
    }
    if(t.period==='bimensuel'){
      if(fixedDow===undefined)return;
      const wom=weekOfMonth(date);
      const allowed=t.fixedWeeks||BIMENSUEL_WEEKS[t.id]||[0,2];
      if((dow===fixedDow&&allowed.includes(wom))||['ok','prov'].includes(iSt(kid,t.id,date)))
        tasks.push({...t,isCommon:false});
      return;
    }
    if(t.period==='quinzaine'){
      if(isQuinzaineDay(t.id,date)||['ok','prov'].includes(iSt(kid,t.id,date)))
        tasks.push({...t,isCommon:false});
      return;
    }
  });
  return tasks;
}

function dayState(kid,date){
  const tasks=tasksForDay(kid,date);
  if(!tasks.length)return'empty';
  let anyOk=false,anyProv=false,anyPending=false;
  tasks.forEach(t=>{
    const st=t.isCommon?(cEntry(t.id,date)?.who===kid?cEntry(t.id,date)?.st:null):iSt(kid,t.id,date);
    if(st==='ok')anyOk=true;
    else if(st==='prov')anyProv=true;
    else anyPending=true;
  });
  if(!anyPending&&!anyProv&&anyOk)return'all-ok';
  if(anyProv||anyOk)return'prov';
  return'has';
}

    <button class="dnav" id="btn-prev-wk">◀</button>
    <span style="font-size:12px;font-weight:800;color:var(--tx2)">${wkLbl}</span>
    <button class="dnav" id="btn-next-wk">▶</button>
  </div>`;

  h+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem">`;

  days.forEach((ds,i)=>{
    const isToday=ds===today;
    const isSel=ds===selDate;
    const tasks=tasksForDay(kid,ds);
    const total=tasks.length;
    const doneCount=tasks.filter(t=>{
      const st=t.isCommon?(cEntry(t.id,ds)?.who===kid?cEntry(t.id,ds)?.st:null):iSt(kid,t.id,ds);
      return st==='ok'||st==='prov';
    }).length;
    const allDone=total>0&&doneCount===total;
    const partial=doneCount>0&&doneCount<total;

    // Couleur de fond de la colonne
    let colBg='background:#fff';
    if(isToday) colBg=`background:var(--${kc})`;
    else if(isSel) colBg='background:var(--bg);box-shadow:0 0 0 3px var(--tx)';
    else if(allDone) colBg='background:var(--ok-l)';
    else if(partial) colBg='background:var(--warn-l)';

    const dayNum=new Date(ds+'T12:00:00').getDate();
    const txtCol=isToday?'#fff':'var(--tx)';
    const subCol=isToday?'rgba(255,255,255,.75)':'var(--tx2)';

    // Petites puces de tâches
    let dots='';
    if(total>0){
      tasks.slice(0,4).forEach(t=>{
        const st=t.isCommon?(cEntry(t.id,ds)?.who===kid?cEntry(t.id,ds)?.st:null):iSt(kid,t.id,ds);
        const done=st==='ok'||st==='prov';
        dots+=`<div style="width:100%;height:18px;border-radius:4px;margin-bottom:2px;display:flex;align-items:center;padding:0 3px;font-size:9px;font-weight:800;overflow:hidden;white-space:nowrap;
          background:${done?(isToday?'rgba(255,255,255,.3)':'rgba(46,184,114,.2)'):'rgba(26,26,46,.06)'};
          color:${done?(isToday?'rgba(255,255,255,.9)':'var(--ok)'):(isToday?'rgba(255,255,255,.7)':'var(--tx3)')};
          text-decoration:${done?'line-through':'none'}">
          ${taskIcon(t.label)}
        </div>`;
      });
      if(total>4) dots+=`<div style="font-size:9px;font-weight:800;color:${isToday?'rgba(255,255,255,.6)':'var(--tx3)'};text-align:center">+${total-4}</div>`;
    }

    h+=`<div onclick="renderKidDay('${kid}','${ds}')" style="border-radius:10px;padding:6px 4px;cursor:pointer;min-height:90px;transition:all .1s;${colBg};border:${isSel&&!isToday?'2.5px solid var(--tx)':'2px solid transparent'}">
      <div style="text-align:center;margin-bottom:5px">
        <div style="font-size:10px;font-weight:800;color:${subCol};text-transform:uppercase;letter-spacing:.04em">${J[new Date(ds+'T12:00:00').getDay()]}</div>
        <div style="font-size:15px;font-weight:900;color:${txtCol};line-height:1.2">${dayNum}</div>
      </div>
      ${dots}
    </div>`;
  });

  h+=`</div>`;
  return h;
}

function renderDayDetail(kid, date, kc, wk){
  const today=todayStr();
  const myCommons=slotsForKidDay(kid,date).map(({t,slot})=>{
    const ent=ccEntry(t.id,date,slot);
    return {...t, slot, slotSt:ent?.st||null};
  });
  const myIndiv=tasksForDay(kid,date).filter(t=>!t.isCommon);

  if(!myCommons.length&&!myIndiv.length){
    return `<div class="empty"><span class="empty-emoji">🌈</span>Aucune tâche ce jour !<br>Profite bien !</div>`;
  }

  const d=new Date(date+'T12:00:00');
  const J=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const lbl=J[d.getDay()]+' '+d.getDate()+(date===today?' ✨':'');

  let h=`<div style="font-size:14px;font-weight:900;color:var(--tx);margin-bottom:.6rem;display:flex;align-items:center;gap:8px">
    <div style="width:10px;height:10px;border-radius:50%;background:var(--${kc});flex-shrink:0"></div>
    ${lbl}
  </div>`;

  if(myCommons.length){
    h+=`<div class="slbl">🏠 Tâches communes</div>`;
    myCommons.forEach(t=>{
      const st=t.slotSt;
      const slotLbl=SLOT_LBL[t.slot]||t.slot;
      const lbl=slotLbl?t.label+' <span style="font-size:11px;font-weight:700;color:var(--tx3)">('+slotLbl+')</span>':t.label;
      h+=kidCard({label:lbl,pts:t.pts,st,isCommon:true,kc,
        onclick:st==='ok'?null:st==='prov'
          ?`kidUncheckSlot('${t.id}','${date}','${t.slot}')`
          :`kidCheckSlot('${t.id}','${date}','${t.slot}','${kid}')`});
    });
  }
  if(myIndiv.length){
    h+=`<div class="slbl">⭐ Mes tâches</div>`;
    myIndiv.forEach(t=>{
      const st=iSt(kid,t.id,date);
      h+=kidCard({label:t.label,pts:t.pts,st,isCommon:false,kc,period:t.period,
        onclick:st==='ok'?null:st==='prov'?`kidUncheckI('${kid}','${t.id}','${date}')`:
          `kidCheckI('${kid}','${t.id}','${date}')`});
    });
  }
  return h;
}

function kidCard({label,pts,st,isCommon,kc,period,onclick}){
  let stCls='',chkCls='empty',chkIn='',chipHtml='';
  const icon=taskIcon(label);
  if(st==='prov'){
    stCls=' st-prov';chkCls='prov';chkIn='?';
    chipHtml=`<span class="chip warn">⏳ en attente</span>`;
  }else if(st==='ok'){
    stCls=' st-ok';chkCls='ok';chkIn=chkSvg();
    chipHtml=`<span class="chip ok">✓ validé !</span>`;
  }else if(st==='rej'){
    stCls=' st-rej';chkCls='rej';chkIn='✕';
    chipHtml=`<span class="chip err">↩ à refaire</span>`;
  }
  const perLbl=period?`<span class="chip co">${PLBL[period]}</span>`:'';
  const clickAttr=onclick&&st!=='ok'?`onclick="${onclick}"`:'style="cursor:default"';
  return`<div class="tc${isCommon?' com '+kc+'-tc':''}${stCls}${onclick&&st!=='ok'?' click':''}" ${clickAttr}>
    <div class="ticon ${isCommon?'co-ic':kc+'-ic'}">${icon}</div>
    <div class="tbd">
      <div class="tn">${label}</div>
      <div class="tm">${pts} banane${pts>1?'s':''}  ${chipHtml}${perLbl}</div>
    </div>
    <div class="chk ${chkCls}" onclick="${onclick&&st!=='ok'?onclick:'void(0)'}">${chkIn}</div>
  </div>`;
}

function buildMiniCal(kid,mk,sel){
  const[y,mo]=mk.split('-').map(Number);
  const days=daysInMonth(mk),first=firstDOW(mk),today=todayStr();
  const kc=KC[kid];
  const J=['Lu','Ma','Me','Je','Ve','Sa','Di'];
  let h=`<div class="mini-cal ${kc}-cal">
    <div class="mini-cal-title">📅 ${new Date(y,mo-1,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</div>
    <div class="mini-grid">`;
  J.forEach(j=>h+=`<div class="mhd">${j}</div>`);
  for(let i=0;i<first;i++)h+=`<div class="md other"></div>`;
  for(let d=1;d<=days;d++){
    const ds=y+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const st=dayState(kid,ds),isToday=ds===today,isSel=ds===sel&&!isToday;
    h+=`<button class="md ${st}${isToday?' today':''}${isSel?' sel':''}" onclick="renderKidDay('${kid}','${ds}')">
      <div class="mn">${d}</div>
      ${st!=='empty'?'<div class="mdot"></div>':''}
    </button>`;
  }
  h+='</div></div>';
  return h;
}

      <div class="mp-top">
        <div>
          <div class="mp-label">Bananes du mois</div>
          <div class="mp-val">${okPt} <span style="font-size:1.2rem">bananes</span></div>

function kidCardReadOnly({label,pts,st,isCommon,kc,period}){
  let stCls='',chkCls='empty',chkIn='',chipHtml='';
  const icon=taskIcon(label);
  if(st==='prov'){stCls=' st-prov';chkCls='prov';chkIn='?';chipHtml=`<span class="chip warn">⏳ en attente</span>`;}
  else if(st==='ok'){stCls=' st-ok';chkCls='ok';chkIn=chkSvg();chipHtml=`<span class="chip ok">✓ validé !</span>`;}
  else if(st==='rej'){stCls=' st-rej';chkCls='rej';chkIn='✕';chipHtml=`<span class="chip err">↩ à refaire</span>`;}
  const perLbl=period?`<span class="chip co">${PLBL[period]||period}</span>`:'';
  return`<div class="tc${isCommon?' com '+kc+'-tc':''}${stCls}" style="cursor:default;margin-bottom:6px">
    <div class="ticon ${isCommon?'co-ic':kc+'-ic'}">${icon}</div>
    <div class="tbd">
      <div class="tn">${label}</div>
      <div class="tm">${pts} banane${pts>1?'s':''}  ${chipHtml}${perLbl}</div>
    </div>
    <div class="chk ${chkCls}" style="cursor:default">${chkIn}</div>
  </div>`;
}

function renderParentValidation(){
  const today=todayStr();
  const cutoffPast=new Date();cutoffPast.setDate(cutoffPast.getDate()-7);
  const cutoffPastStr=d2s(cutoffPast);
  const pending=[];
  Object.keys(S).forEach(k=>{
    if(k.startsWith('i|')&&S[k]==='prov'){
      const[,kid,tid,date]=k.split('|');
      if(date>today)return;
      if(date<cutoffPastStr)return; // ignorer les entrées de plus de 7 jours
      const t=(INDIV[kid]||[]).find(x=>x.id===tid) || Object.values(S['custom|'+kid]||{}).find(x=>x.id===tid);
      if(t)pending.push({type:'indiv',kid,tid,date,label:t.label,pts:t.pts});
    }
    if(k.startsWith('cc|')&&S[k]?.st==='prov'){
      const parts=k.split('|');
      const[,tid,date,slot]=parts;
      if(date>today)return;
      if(date<cutoffPastStr)return; // ignorer les entrées de plus de 7 jours
      const t=COMMON.find(x=>x.id===tid);
      const slotLabel=SLOT_LBL[slot];
      if(t)pending.push({type:'slot',kid:S[k].by,tid,date,slot,label:t.label+(slotLabel?' ('+slotLabel+')':''),pts:t.pts});
    }
  });
  pending.sort((a,b)=>b.date.localeCompare(a.date));

  // Collect already validated tasks (recent — last 7 days)
  const validated=[];
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-7);
  const cutoffStr=cutoff.toISOString().slice(0,10);
  Object.keys(S).forEach(k=>{
    if(k.startsWith('i|')&&S[k]==='ok'){
      const[,kid,tid,date]=k.split('|');
      if(date<cutoffStr)return;
      const t=(INDIV[kid]||[]).find(x=>x.id===tid) || Object.values(S['custom|'+kid]||{}).find(x=>x.id===tid);
      if(t)validated.push({type:'indiv',kid,tid,date,label:t.label,pts:t.pts});
    }
    if(k.startsWith('cc|')&&S[k]?.st==='ok'){
      const parts=k.split('|');
      const[,tid,date,slot]=parts;
      if(date<cutoffStr)return;
      const t=COMMON.find(x=>x.id===tid);
      const slotLabelV=SLOT_LBL[slot];
      if(t)validated.push({type:'slot',kid:S[k].by,tid,date,slot,label:t.label+(slotLabelV?' ('+slotLabelV+')':''),pts:t.pts});
    }
  });
  validated.sort((a,b)=>b.date.localeCompare(a.date));

  let h='';
  if(!pending.length){
    h=`<div class="empty"><span class="empty-emoji">🎉</span>Tout est validé !<br>Pas de tâche en attente.</div>`;
  }else{
    h+=`<div class="val-banner">
      <div class="val-banner-title">⏳ ${pending.length} tâche${pending.length>1?'s':''} en attente</div>
      <div class="val-banner-sub">Validez ou renvoyez à refaire</div>
    </div>`;

    KIDS.forEach(kid=>{
      const mine=pending.filter(p=>p.kid===kid);
      if(!mine.length)return;
      const kc=KC[kid];
      h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--${kc==='sa'?'sa':'el'===kc?'el':'sr'}-l);border-radius:var(--rsm);margin-bottom:6px">
        <div style="display:flex;align-items:center;gap:8px">
          ${kidAvatar(kid,"32px")}
          <span style="font-size:14px;font-weight:900;color:var(--${kc}-d)">${kid}</span>
        </div>
        <button onclick="validateAll('${kid}')" style="font-size:11px;font-weight:900;background:var(--ok);color:#fff;border:none;border-radius:20px;padding:4px 12px;cursor:pointer;font-family:'Nunito',sans-serif">Tout valider ✓</button>
      </div>`;
      mine.forEach(p=>{
        const icon=taskIcon(p.label);
        h+=`<div class="tc st-prov" style="margin-bottom:6px">
          <div class="ticon ${kc}-ic">${icon}</div>
          <div class="tbd">
            <div class="tn">${p.label}</div>
            <div class="tm">${p.pts} · ${fmtDay(p.date)}</div>
            <div class="val-btns">
              <button class="btn-ok" onclick="parentValidate('${p.type}','${p.kid}','${p.tid}','${p.date}','${p.slot||''}')">✓ Valider</button>
              <button class="btn-rej" onclick="parentReject('${p.type}','${p.kid}','${p.tid}','${p.date}','${p.slot||''}')">✕ Refaire</button>
            </div>
          </div>
          <div class="chk prov">?</div>
        </div>`;
      });
    });
  }
  // Section tâches déjà validées (annulables)
  if(validated.length){
    h+=`<div class="slbl" style="margin-top:1.25rem">✅ Validées récemment — annulables</div>`;
    validated.slice(0,10).forEach(p=>{
      const kc=KC[p.kid];
      const icon=taskIcon(p.label);
      const sl=p.slot||'';
      h+=`<div class="tc st-ok" style="margin-bottom:5px;opacity:1">
        <div class="ticon ${kc}-ic" style="width:32px;height:32px;font-size:15px">${icon}</div>
        <div class="tbd">
          <div class="tn" style="font-size:13px">${p.label}</div>
          <div class="tm"><span class="chip ${kc}">${p.kid}</span> · ${fmtDay(p.date)}</div>
        </div>
        <button onclick="cancelValidation('${p.type}','${p.kid}','${p.tid}','${p.date}','${sl}')"
          style="font-size:11px;font-weight:900;padding:4px 10px;border-radius:20px;border:2px solid var(--warn);background:var(--warn-l);color:#b45309;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0">
          ↩ Annuler
        </button>
      </div>`;
    });
  }

  setPane('validation',h);
  refreshBadge();
}

function cancelValidation(type,kid,tid,date,slot){
  if(!confirm('Annuler cette validation ?'))return;
  if(type==='indiv')setISt(kid,tid,date,'prov');
  else if(type==='slot')ccSet(tid,date,slot,kid,'prov');
  saveS();renderParentValidation();
}

function parentValidate(type,kid,tid,date,slot){
  if(type==='indiv')setISt(kid,tid,date,'ok');
  else if(type==='slot')ccSet(tid,date,slot,kid,'ok');
  saveS();renderParentValidation();
}
function parentReject(type,kid,tid,date,slot){
  if(type==='indiv')setISt(kid,tid,date,'rej');
  else if(type==='slot')ccSet(tid,date,slot,kid,'rej');
  saveS();renderParentValidation();
}
function validateAll(kid){
  const today=todayStr();
  Object.keys(S).forEach(k=>{
    if(k.startsWith('i|'+kid+'|')&&S[k]==='prov'){
      const date=k.split('|')[3];
      if(date<=today)S[k]='ok';
    }
    if(k.startsWith('cc|')&&S[k]?.by===kid&&S[k]?.st==='prov'){
      const date=k.split('|')[2];
      if(date<=today)S[k]={...S[k],st:'ok'};
    }
  });
  saveS();renderParentValidation();
}

function prevMkFn(mk){
  const[y,mo]=mk.split('-').map(Number);
  return mo===1?(y-1)+'-12':`${y}-${String(mo-1).padStart(2,'0')}`;
}
function moisLabel(mk){
  const[y,mo]=mk.split('-').map(Number);
  const M=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  return M[mo-1]+' '+y;
}

function bilanContent(kid,per,mk,wk){
  const isW=per==='week';
  const isPrev=per==='prevmonth';
  const targetMk=isPrev?prevMkFn(mk||mKey()):(mk||mKey());
  const{ok,prov}=isW?earnedWeek(kid,wk):earnedMonth(kid,targetMk);
  const bud=BUDGETS[kid],pctOk=Math.min(100,ok/bud*100),surplus=Math.max(0,ok-bud);
  const kc=KC[kid];
  const filterFn=isW?d=>wkKey(d)===wk:d=>mKey(d)===targetMk;
  if(isPrev){
    // Bandeau mois précédent avec montant à virer
    let h=`<div style="background:var(--${kc}-l);border-radius:var(--rsm);padding:10px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;font-weight:800;color:var(--${kc}-d)">${moisLabel(targetMk)}</span>
      <span style="font-size:18px;font-weight:900;color:var(--${kc}-d)">💸 ${ok.toFixed(2).replace('.',',')} €</span>
    </div>`;
    (INDIV[kid]||[]).forEach(t=>{
      const okC=Object.keys(S).filter(k=>k.startsWith('i|'+kid+'|'+t.id+'|')&&filterFn(k.split('|')[3])&&S[k]==='ok').length;
      if(okC>0){
        const icon=taskIcon(t.label);
        h+=`<div class="tc" style="cursor:default;padding:9px 13px;margin-bottom:4px">
          <div class="ticon ${kc}-ic" style="width:32px;height:32px;font-size:16px">${icon}</div>
          <div class="tbd">
            <div class="tn" style="font-size:13px">${t.label}</div>
            <div class="tm">${PLBL[t.period]} · <strong>${okC}×</strong> validé · ${(okC*t.pts*0.1).toFixed(2).replace('.',',')} €</div>
          </div>
        </div>`;
      }
    });
    return h;
  }
  let h=`<div class="${kc}-bar">
    <div class="prog-dbl">
      <div class="prog-dbl-ok" style="width:${pctOk.toFixed(1)}%"></div>
      <div class="prog-dbl-pv" style="left:${pctOk.toFixed(1)}%;width:${Math.max(0,Math.min(100,(ok+prov)/bud*100)-pctOk).toFixed(1)}%"></div>
    </div>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:10px">
    <span>${ok.toFixed(2).replace('.',',')} € validés${prov>0?` · ${prov.toFixed(2).replace('.',',')} € en attente`:''}</span>
    <span>${surplus>0?`+${surplus.toFixed(2).replace('.',',')} € → pot 🏦`:(bud-ok).toFixed(2).replace('.',',')+' € restants'}</span>
  </div>`;
  (INDIV[kid]||[]).forEach(t=>{
    const okC=Object.keys(S).filter(k=>k.startsWith('i|'+kid+'|'+t.id+'|')&&filterFn(k.split('|')[3])&&S[k]==='ok').length;
    const prC=Object.keys(S).filter(k=>k.startsWith('i|'+kid+'|'+t.id+'|')&&filterFn(k.split('|')[3])&&S[k]==='prov').length;
    if(okC>0||prC>0){
      const icon=taskIcon(t.label);
      h+=`<div class="tc" style="cursor:default;padding:9px 13px;margin-bottom:4px">
        <div class="ticon ${kc}-ic" style="width:32px;height:32px;font-size:16px">${icon}</div>
        <div class="tbd">
          <div class="tn" style="font-size:13px">${t.label}</div>
          <div class="tm">${PLBL[t.period]} · <strong>${okC}×</strong> validé${prC>0?` · <span class="chip warn">${prC}× en attente</span>`:''}</div>
        </div>
      </div>`;
    }
  });
  return h;
}

function renderParentPot(){
  const mk=mKey();
  const pot=potMonth(mk);
  const pctSem=potPct(todayStr())*100;

  // Objectifs
  if(!S.objectives)S.objectives=[];

  let h='';

  // Pot total
  h+=`<div style="background:linear-gradient(135deg,#1a1a2e,#2d2d4e);border-radius:var(--r);padding:16px;margin-bottom:1rem;box-shadow:0 6px 24px rgba(26,26,46,.2)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div>
        <div style="font-size:12px;font-weight:800;color:rgba(255,255,255,.5)">🏦 Pot commun ce mois</div>
        <div style="font-size:2.2rem;font-weight:900;color:#fff;line-height:1.1">${pot.toFixed(2).replace('.',',')} €</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.5)">Ce mois</div>
        <div style="font-size:1.4rem;font-weight:900;color:var(--straw)">${pctSem.toFixed(0)}%</div>
        <div style="font-size:10px;color:rgba(255,255,255,.4)">des bananes</div>
      </div>
    </div>
    <div style="background:rgba(255,255,255,.1);border-radius:4px;height:6px;overflow:hidden">
      <div style="height:100%;width:${pctSem}%;background:var(--straw);border-radius:4px"></div>
    </div>
    <div style="font-size:10px;color:rgba(255,255,255,.35);margin-top:4px">Sem 1:10% · Sem 2:20% · Sem 3:30% · Sem 4:40%</div>
  </div>`;

  // Contribution par enfant
  h+=`<div class="slbl">Contribution ce mois</div>`;
  KIDS.forEach(kid=>{
    const{okPt,potPt}=earnedMonth(kid,mk);
    const kc=KC[kid];
    const potE=(potPt*RATE).toFixed(2).replace('.',',');
    h+=`<div class="tc" style="cursor:default;margin-bottom:6px">
      <div style="font-size:22px;width:32px;height:32px">${kidAvatar(kid,"32px")}</div>
      <div class="tbd">
        <div class="tn" style="font-size:13px">${kid}</div>
        <div class="tm">${okPt} bananes validées · 🏦 ${potPt} → ${potE} €</div>
      </div>
    </div>`;
  });

  // Objectifs
  h+=`<div class="slbl" style="margin-top:1.25rem">🎯 Objectifs</div>`;
  if(!S.objectives.length){
    h+=`<div class="empty" style="padding:1rem 0">Aucun objectif pour l'instant.</div>`;
  }else{
    S.objectives.forEach((obj,i)=>{
      const pct=Math.min(100,pot/obj.target*100);
      const atteint=pot>=obj.target;
      h+=`<div style="background:#fff;border:2.5px solid ${atteint?'var(--ok)':'rgba(26,26,46,.08)'};border-radius:var(--r);padding:14px;margin-bottom:8px;box-shadow:var(--shadow-sm)">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <div style="font-size:15px;font-weight:900;color:var(--tx)">${obj.name}</div>
            <div style="font-size:12px;font-weight:700;color:var(--tx2);margin-top:2px">${pot.toFixed(2).replace('.',',')} € / ${obj.target.toFixed(2).replace('.',',')} €</div>
          </div>
          <div style="display:flex;gap:5px;align-items:center">
            ${atteint?`<span style="font-size:11px;font-weight:900;background:var(--ok-l);color:var(--ok);padding:3px 8px;border-radius:20px">🎉 Atteint !</span>`:''}
            <button onclick="deleteObjective(${i})" style="background:none;border:none;cursor:pointer;color:var(--tx3);font-size:18px">×</button>
          </div>
        </div>
        <div style="background:var(--bg);border-radius:5px;height:10px;overflow:hidden">
          <div style="height:100%;width:${pct.toFixed(1)}%;background:${atteint?'var(--ok)':'var(--sa)'};border-radius:5px;transition:width .4s"></div>
        </div>
        <div style="font-size:11px;font-weight:700;color:var(--tx3);margin-top:4px;text-align:right">${pct.toFixed(0)}%</div>
      </div>`;
    });
  }

  // Formulaire nouvel objectif
  h+=`<button onclick="toggleObjForm()" style="width:100%;padding:10px;border:2.5px dashed rgba(26,26,46,.15);border-radius:var(--rsm);background:none;cursor:pointer;font-size:13px;font-weight:800;color:var(--tx2);font-family:'Nunito',sans-serif;margin-top:4px">
    + Nouvel objectif
  </button>
  <div id="obj-form" style="display:none;background:#fff;border:2.5px solid rgba(26,26,46,.08);border-radius:var(--r);padding:14px;margin-top:8px;box-shadow:var(--shadow-sm)">

    <input id="obj-name" type="text" placeholder="ex : Cinéma en famille" style="width:100%;height:40px;border:2.5px solid rgba(26,26,46,.1);border-radius:var(--rsm);padding:0 12px;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;color:var(--tx);background:var(--bg);outline:none;margin-bottom:8px">
    <div style="font-size:12px;font-weight:800;color:var(--tx2);margin-bottom:4px">Montant cible (€)</div>
    <input id="obj-target" type="number" min="1" step="0.5" placeholder="ex : 30" style="width:100%;height:40px;border:2.5px solid rgba(26,26,46,.1);border-radius:var(--rsm);padding:0 12px;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;color:var(--tx);background:var(--bg);outline:none;margin-bottom:10px">
    <div style="display:flex;gap:8px">
      <button onclick="saveObjective()" style="flex:1;padding:10px;background:var(--tx);color:#fff;border:none;border-radius:var(--rsm);font-size:13px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif">✓ Enregistrer</button>
      <button onclick="toggleObjForm()" style="padding:10px 14px;background:none;border:2.5px solid rgba(26,26,46,.1);border-radius:var(--rsm);font-size:13px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--tx2)">Annuler</button>
    </div>
  </div>`;

  setPane('pot',h);
}

function toggleObjForm(){
  const f=document.getElementById('obj-form');
  if(f)f.style.display=f.style.display==='none'?'block':'none';
}
function saveObjective(){
  const name=document.getElementById('obj-name')?.value?.trim();
  const target=parseFloat(document.getElementById('obj-target')?.value);
  if(!name||!target||target<=0){alert('Remplissez le nom et le montant.');return;}
  if(!S.objectives)S.objectives=[];
  S.objectives.push({name,target,createdAt:todayStr()});
  saveS();renderParentPot();
}
function deleteObjective(i){
  if(!confirm('Supprimer cet objectif ?'))return;
  S.objectives.splice(i,1);
  saveS();renderParentPot();
}

function potCard(mk){
  const pot=potMonth(mk||mKey());
  const pct=potPct(todayStr())*100;
  const obj=(S.objectives||[]).find(o=>pot<o.target)||(S.objectives||[])[0];
  const potBananes=Math.round(pot/RATE);
  if(obj){
    const target=Math.round(obj.target/RATE);
    const pctObj=Math.min(100,potBananes/target*100);
    return`<div class="pot" style="flex-direction:column;gap:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;width:100%">
        <div><div class="pot-lbl">Cagnotte — ${obj.name}</div><div class="pot-v" style="font-size:1.6rem">${potBananes} <span style="font-size:1rem">/ ${target}</span></div></div>
        <div style="font-size:1.5rem">${pctObj>=100?'🎉':'🏦'}</div>
      </div>
      <div style="width:100%;background:rgba(255,255,255,.2);border-radius:5px;height:10px;overflow:hidden">
        <div style="height:100%;width:${pctObj.toFixed(1)}%;background:#fff;border-radius:5px;transition:width .4s"></div>
      </div>
      <div style="font-size:11px;color:rgba(255,255,255,.6);text-align:right">${pctObj.toFixed(0)}% de l'objectif atteint · ${pct.toFixed(0)}% → cagnotte cette semaine</div>
    </div>`;
  }
  return`<div class="pot">
    <div><div class="pot-lbl">Cagnotte famille</div><div class="pot-v">${potBananes} bananes</div></div>
    <div style="text-align:right"><div style="font-size:1rem;font-weight:800;color:rgba(255,255,255,.7)">${pct.toFixed(0)}% → cagnotte</div><div class="pot-sub">cette semaine</div></div>
  </div>`;
}

function renderNotif(){
  const s=JSON.parse(localStorage.getItem('nostaches_notif')||'{}');
  let st='Appuie sur Enregistrer pour activer les rappels !';
  if(!('Notification' in window))st='Les notifications ne sont pas supportées.';
  else if(Notification.permission==='denied')st='Notifications bloquées dans les réglages.';
  else if(Notification.permission==='granted'){
    const a=[s.morning&&'matin',s.evening&&'soir'].filter(Boolean);
    st=a.length?'✅ Actifs : '+a.join(', '):'Aucun rappel activé.';
  }
  setPane('notif',`
  <div style="text-align:center;padding:1.5rem 0 1rem">
    <span style="font-size:3rem">🔔</span>
    <div style="font-size:16px;font-weight:900;margin-top:.5rem">Mes rappels</div>
  </div>
  <div class="nrow">
    <div><div style="font-size:14px;font-weight:800">Rappel matin</div><div style="font-size:12px;font-weight:700;color:var(--tx2)">Pense à tes tâches du jour !</div></div>
    <label class="tgl"><input type="checkbox" id="n-m" ${s.morning?'checked':''}><span class="tslider"></span></label>
  </div>
  <div class="nrow"><label style="font-size:14px;font-weight:800">Heure</label><input type="time" class="tin" id="t-m" value="${s.timeMorning||'08:00'}"></div>
  <div class="nrow" style="margin-top:6px">
    <div><div style="font-size:14px;font-weight:800">Rappel soir</div><div style="font-size:12px;font-weight:700;color:var(--tx2)">As-tu fini tes tâches ?</div></div>
    <label class="tgl"><input type="checkbox" id="n-e" ${s.evening?'checked':''}><span class="tslider"></span></label>
  </div>
  <div class="nrow"><label style="font-size:14px;font-weight:800">Heure</label><input type="time" class="tin" id="t-e" value="${s.timeEvening||'19:00'}"></div>
  <div style="font-size:13px;font-weight:700;color:var(--tx2);margin:1rem 0;padding:10px 14px;background:#fff;border-radius:var(--rsm);border:2.5px solid rgba(26,26,46,.07)">${st}</div>
  <button class="save-btn" onclick="applyNotif()">🔔 Enregistrer les rappels</button>
  <p style="font-size:11px;font-weight:700;color:var(--tx3);text-align:center;margin-top:.6rem">Fonctionne après ajout à l'écran d'accueil</p>`);
}
async function applyNotif(){
  const s={morning:document.getElementById('n-m').checked,evening:document.getElementById('n-e').checked,
    timeMorning:document.getElementById('t-m').value,timeEvening:document.getElementById('t-e').value};
  localStorage.setItem('nostaches_notif',JSON.stringify(s));
  if(!('Notification' in window)){alert('Non supporté.');return;}
  if(Notification.permission!=='granted'&&await Notification.requestPermission()!=='granted'){renderNotif();return;}
  new Notification('Nos tâches',{body:'Rappels configurés ! 🎉'});
  renderNotif();
}

      </div>
      <button id="authSignInBtn" style="height:48px;border:none;border-radius:16px;background:#1a1a2e;color:#fff;font:900 15px Nunito,sans-serif;cursor:pointer">Se connecter</button>
      <button id="authCancelBtn" style="height:42px;border:none;border-radius:14px;background:#f3f4f6;color:#1a1a2e;font:800 14px Nunito,sans-serif;cursor:pointer">Annuler</button>
    </div>
    <div id="authMsg" style="min-height:1.4em;margin-top:.7rem;font:800 12px Nunito,sans-serif;color:#6b6b8a;text-align:center"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js';
import { 
  getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut,
  updatePassword, EmailAuthProvider, reauthenticateWithCredential
} from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js';
import {
  getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
   apiKey: "AIzaSyDbD0DlSdxPwhk8nAvjpxvjDqdyUrobdy4",
   authDomain: "mission-bananes.firebaseapp.com",
   projectId: "mission-bananes",
   storageBucket: "mission-bananes.firebasestorage.app",
   messagingSenderId: "781425954201",
   appId: "1:781425954201:web:a887d9f13a7f1dd8e2d708",
};

const CONFIG_READY = FIREBASE_CONFIG.apiKey !== "A_COMPLETER";
const overlay = document.getElementById('authOverlay');
const authMsg = document.getElementById('authMsg');
const authProfileLbl = document.getElementById('authProfileLbl');
const emailInput = document.getElementById('authEmail');
const passwordInput = document.getElementById('authPassword');
const signInBtn = document.getElementById('authSignInBtn');
const cancelBtn = document.getElementById('authCancelBtn');

let selectedProfile = null;
let currentProfile = null;
let app = null, auth = null, db = null, unsubState = null;
let currentFamilyId = null;
let cloudState = null;
let openingFromButton = false;

window.__mbFirebaseReady = CONFIG_READY;

function setAuthMsg(msg, isErr=false){
  authMsg.textContent = msg || '';
  authMsg.style.color = isErr ? '#b91c1c' : '#6b6b8a';
}
function showOverlay(profile=null){
  selectedProfile = profile || selectedProfile || localStorage.getItem('mb_last_profile') || 'Parents';
  authProfileLbl.textContent = 'Connexion : ' + selectedProfile;
  overlay.style.display = 'flex';
  setAuthMsg(CONFIG_READY ? '' : 'Il faut d’abord compléter la configuration Firebase dans le fichier index.html.', !CONFIG_READY);
  if(!emailInput.value){
    const lastMail = localStorage.getItem('mb_last_email');
    if(lastMail) emailInput.value = lastMail;
  }
}
function hideOverlay(){ overlay.style.display = 'none'; }
window.__mbShowOverlay = showOverlay;

// Emails par profil (enfants auto-remplis, parents laissé libre)
const PROFILE_EMAILS = {
  Sacha: 'sacha@bananes.com',
  Elsa:  'elsa@bananes.com',
  Sarah: 'sarah@bananes.com',
};

document.querySelectorAll('.authPick').forEach(btn=>{
  btn.addEventListener('click',()=>{
    selectedProfile = btn.dataset.profile;
    authProfileLbl.textContent = 'Connexion : ' + selectedProfile;
    setAuthMsg('');
    // Pré-remplir l'email si profil enfant
    if(PROFILE_EMAILS[selectedProfile]){
      emailInput.value = PROFILE_EMAILS[selectedProfile];
      passwordInput.focus();
    } else {
      emailInput.value = localStorage.getItem('mb_last_email') || '';
      emailInput.focus();
    }
  });
});
cancelBtn.addEventListener('click',()=>{
  hideOverlay();
  if(!auth?.currentUser){
    document.getElementById('sm').style.display='none';
    document.getElementById('sw').style.display='flex';
  }
});

function expectedFromUserDoc(data){
  if(!data) return null;
  if(data.role === 'parent') return 'Parents';
  if(data.role === 'kid' && data.kidName) return data.kidName;
  return null;
}
function loadCloudIntoState(){
  try{
    if(cloudState && typeof cloudState === 'object'){
      S = JSON.parse(JSON.stringify(cloudState));
      localStorage.setItem(SK, JSON.stringify(S));
    }else{
      S = JSON.parse(localStorage.getItem(SK) || '{}');
    }
  }catch(e){
    S = {};
  }
}
window.loadS = loadCloudIntoState;

// Protection anti-rebond : timestamp de notre dernière écriture locale
let _localWriteTs = 0; // ms epoch de notre dernier saveS
const _LOCAL_WRITE_GRACE = 5000; // ignorer les snapshots pendant 5s après une écriture locale

window.saveS = function(){
  setSd('spin');
  // Nettoyage : supprimer les clés undefined/null avant sauvegarde
  const clean={};
  Object.keys(S).forEach(k=>{if(S[k]!==null&&S[k]!==undefined)clean[k]=S[k];});
  Object.assign(S,clean);
  Object.keys(S).forEach(k=>{if(!(k in clean))delete S[k];});
  localStorage.setItem(SK, JSON.stringify(S));
  _localWriteTs = Date.now(); // marquer l'instant de l'écriture
  if(!db || !auth?.currentUser || !currentFamilyId){
    setTimeout(()=>setSd('ok'),200);
    return;
  }
  setDoc(doc(db,'families',currentFamilyId,'state','app'), {
    S,
    updatedAt: serverTimestamp(),
    updatedBy: auth.currentUser.uid
  }, {merge:true})
  .then(()=>setSd('ok'))
  .catch(err=>{
    console.error('Firebase save error', err);
    setSd('ok');
    alert('La synchronisation Firebase a échoué.');
  });
};

const origLogin = window.login;
const origLogout = window.logout;

window.login = async function(profile){
  if(!CONFIG_READY){
    showOverlay(profile);
    return;
  }
  selectedProfile = profile;
  localStorage.setItem('mb_last_profile', profile);
  if(!auth?.currentUser){
    showOverlay(profile);
    return;
  }
  const snap = await getDoc(doc(db,'users',auth.currentUser.uid));
  const data = snap.exists() ? snap.data() : null;
  const allowed = expectedFromUserDoc(data);
  if(allowed !== profile){
    setAuthMsg('Ce compte n’a pas accès à ' + profile + '.', true);
    await signOut(auth);
    showOverlay(profile);
    return;
  }
  currentFamilyId = data.familyId;
  currentProfile = profile;
  hideOverlay();
  localStorage.setItem('mb_last_profile', profile);
  loadCloudIntoState();
  origLogin(profile);
};

window.logout = async function(){
  try{
    if(auth?.currentUser) await signOut(auth);
  }catch(e){
    console.error(e);
  }
  if(unsubState){ unsubState(); unsubState = null; }
  currentProfile = null;
  currentFamilyId = null;
  cloudState = null;
  origLogout();
};

async function subscribeFamilyState(){
  if(unsubState){ unsubState(); unsubState = null; }
  if(!db || !currentFamilyId) return;
  const ref = doc(db,'families',currentFamilyId,'state','app');

  // Charger d'abord l'état initial depuis Firestore (avant d'ouvrir le listener)
  try{
    const first = await getDoc(ref);
    cloudState = first.exists() ? (first.data().S || {}) : {};
  }catch(e){
    cloudState = {};
  }

  unsubState = onSnapshot(ref, snap=>{
    const snapData = snap.exists() ? snap.data() : null;
    const snapS = snapData ? (snapData.S || {}) : {};
    const snapUpdatedBy = snapData ? snapData.updatedBy : null;
    cloudState = snapS;
    if(!ME) return;

    // Ignorer si c'est notre propre écriture qui revient (identifiée par uid)
    const isOurWrite = snapUpdatedBy && auth?.currentUser && snapUpdatedBy === auth.currentUser.uid;
    if(isOurWrite) return;

    // C'est une vraie mise à jour externe — recharger et reconstruire la vue
    const localStr = JSON.stringify(S || {});
    const remoteStr = JSON.stringify(snapS);
    if(localStr === remoteStr) return; // rien de nouveau

    loadCloudIntoState();
    if(ME === 'Parents') buildParentView();
    else buildKidView();
  }, err=>console.error('Firebase snapshot error', err));
}

signInBtn.addEventListener('click', async ()=>{
  if(!CONFIG_READY){
    setAuthMsg('Complète la configuration Firebase avant de continuer.', true);
    return;
  }
  if(!selectedProfile){
    setAuthMsg('Choisis d’abord un profil.', true);
    return;
  }
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if(!email || !password){
    setAuthMsg('Renseigne l’adresse e-mail et le mot de passe.', true);
    return;
  }
  try{
    setAuthMsg('Connexion en cours…');
    localStorage.setItem('mb_last_email', email);
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const snap = await getDoc(doc(db,'users',cred.user.uid));
    const data = snap.exists() ? snap.data() : null;
    const allowed = expectedFromUserDoc(data);
    if(!data || !data.familyId){
      await signOut(auth);
      setAuthMsg("Compte connecté, mais fiche utilisateur Firebase manquante.", true);
      return;
    }
    if(allowed !== selectedProfile){
      await signOut(auth);
      setAuthMsg("Ce compte n’a pas accès à " + selectedProfile + ".", true);
      return;
    }
    currentFamilyId = data.familyId;
    currentProfile = selectedProfile;
    await subscribeFamilyState();
    loadCloudIntoState();
    hideOverlay();
    origLogin(selectedProfile);
  }catch(err){
    console.error(err);
    setAuthMsg("Connexion impossible. Vérifie l'e-mail, le mot de passe et la fiche /users dans Firebase.", true);
  }
});

if(CONFIG_READY){
  app = initializeApp(FIREBASE_CONFIG);
  auth = getAuth(app);
  db = getFirestore(app);

  // Changement de mot de passe
  window.__submitPwdChange = async function(){
    const current = document.getElementById('pwdCurrent').value;
    const nouveau = document.getElementById('pwdNew').value;
    const confirm = document.getElementById('pwdConfirm').value;
    if(!current || !nouveau || !confirm){ setPwdMsg('Remplis tous les champs.', true); return; }
    if(nouveau.length < 6){ setPwdMsg('Le nouveau mot de passe doit faire au moins 6 caractères.', true); return; }
    if(nouveau !== confirm){ setPwdMsg('Les deux nouveaux mots de passe ne correspondent pas.', true); return; }
    const user = auth.currentUser;
    if(!user || !user.email){ setPwdMsg('Non connecté.', true); return; }
    try{
      setPwdMsg('Vérification…');
      const credential = EmailAuthProvider.credential(user.email, current);
      await reauthenticateWithCredential(user, credential);
      await updatePassword(user, nouveau);
      setPwdMsg('✅ Mot de passe modifié !');
      setTimeout(()=>hidePwdModal(), 1500);
    }catch(err){
      if(err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential')
        setPwdMsg('Mot de passe actuel incorrect.', true);
      else
        setPwdMsg('Erreur : ' + err.message, true);
    }
  };

  onAuthStateChanged(auth, async (user)=>{
    if(!user){
      if(unsubState){ unsubState(); unsubState = null; }
      currentProfile = null;
      currentFamilyId = null;
      cloudState = null;
      if(ME){
        origLogout();
      }
      return;
    }
    try{
      const snap = await getDoc(doc(db,'users',user.uid));
      const data = snap.exists() ? snap.data() : null;
      const profile = expectedFromUserDoc(data);
      if(!data || !profile){
        setAuthMsg("Compte connecté, mais fiche /users incomplète.", true);
        return;
      }
      currentFamilyId = data.familyId;
      currentProfile = profile;
      await subscribeFamilyState();
      loadCloudIntoState();
      if(ME !== profile){
        hideOverlay();
        origLogin(profile);
      }
    }catch(err){
      console.error(err);
    }
  });
}
</script>

</body>
</html>
